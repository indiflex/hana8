name: Java Spring demo CI

on:
  push:
    branches: [ release/spring ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: set props securities
      working-directory: java/demo
      run: |
        echo "${{secrets.SECURITY_YML}}" > ./src/main/resources/security.yml
        echo "${{secrets.DB_PROPERTY}}" > ./src/main/resources/db.properties

    - name: setup ssh
      run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.WAS }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

    - name: scp jar to was
      working-directory: java/demo/src/main/resources
      run: |
          scp security.yml ec2-user@${{ secrets.WAS }}:/home/ec2-user/workspace/hanax/security.yml

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build with Gradle Wrapper
      working-directory: java/demo
      run: ./gradlew build -x test

    - name: scp jar to was
      run: |
        scp java/demo/build/libs/*SNAPSHOT.jar ec2-user@${{ secrets.WAS }}:/home/ec2-user/workspace/hanax/hana.jar

    - name: restart tomcat
      run: |
          ssh ec2-user@${{ secrets.WAS }} 'sudo systemctl restart springboot'