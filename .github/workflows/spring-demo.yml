name: Spring demo CI

on:
  push:
    branches: [ rrr ]
#    branches: [ "release/spring" ]

jobs:
  build:

    runs-on: ubuntu-latest
    # permissions:
    #   contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: set props
      working-directory: java/demo
      run: echo "${{secrets.SECURITY_YML}}" > ./src/main/resources/security.yml

    - name: print info
      working-directory: java/demo
      run: |
        pwd
        ls -al
        echo "${{secrets.WAS}}"

    - name: setup ssh
      run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa

